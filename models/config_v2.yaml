work_dir: ./work_dir/ours/ctrgcn_v2

# model
model: adventure_game_jetson.inference.model.ctrgcn.Model
model_args:
  num_class: 5
  num_point: 33
  num_person: 1
  graph: adventure_game_jetson.inference.graph.mediapipe_pose.Graph
  graph_args:
    labeling_mode: 'spatial'
  in_channels: 3
  base_channel: 16        # 4x capacity vs v1 (8) → ~218K params

# training
device: [0]
batch_size: 32
test_batch_size: 32
num_epoch: 80
num_worker: 2
nesterov: True

# optim
weight_decay: 0.0004
base_lr: 0.01
lr_decay_rate: 0.1
step: [40, 60]
warm_up_epoch: 5
